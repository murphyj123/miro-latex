<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/templates/src/app.css" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  </head>
  <body>

    <!-- Screen 1: Gallery -->
    <div id="gallery-screen" class="screen active">
      <div class="gallery-header">
        <h1 class="gallery-title">Maths Templates</h1>
        <input type="text" id="tpl-search" class="gallery-search" placeholder="Search templates..." />
      </div>
      <div class="gallery-categories" id="gallery-categories">
        <button class="cat-pill active" data-cat="all">All</button>
        <button class="cat-pill" data-cat="number">Number</button>
        <button class="cat-pill" data-cat="algebra">Algebra</button>
        <button class="cat-pill" data-cat="geometry">Geometry</button>
        <button class="cat-pill" data-cat="3d-shapes">3D Shapes</button>
        <button class="cat-pill" data-cat="statistics">Statistics</button>
        <button class="cat-pill" data-cat="advanced">Advanced</button>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <!-- Cards populated by JS -->
      </div>
    </div>

    <!-- Screen 2: Editor -->
    <div id="editor-screen" class="screen">
      <div class="editor-top-bar">
        <button id="back-btn" class="back-btn">&larr; Back</button>
        <span class="editor-title" id="editor-title">Template</span>
        <button id="fav-btn" class="fav-btn" title="Add to favourites">&#9734;</button>
        <div class="editor-actions">
          <button id="place-btn" class="place-btn">Place on Board</button>
          <button id="edit-selected-btn" class="bar-btn">Edit Selected</button>
          <label class="size-control">
            <span class="size-label">Size</span>
            <input type="range" id="img-size" min="100" max="1200" value="600" step="50" />
            <span class="size-value" id="size-value">600</span>
          </label>
        </div>
      </div>
      <div class="editor-body">
        <div class="editor-config" id="config-panel">
          <!-- Template config rendered here -->
        </div>
        <div class="editor-preview" id="preview-area">
          <!-- Live SVG preview -->
        </div>
      </div>
    </div>

    <script type="module" src="/templates/src/app.js"></script>
  </body>
</html>
