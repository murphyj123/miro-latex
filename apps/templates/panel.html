<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/shared/panel.css" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  </head>
  <body>

    <!-- Header -->
    <div class="panel-header">
      <div class="panel-header-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="6" height="6" rx="1.5"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5"/>
        </svg>
      </div>
      <div class="panel-header-text">
        <h1>Maths Templates</h1>
        <p>Create &amp; edit maths diagrams</p>
      </div>
    </div>

    <!-- Body -->
    <div class="panel-body">

      <button class="action-btn action-btn-primary" id="browse-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        Browse Library
      </button>

      <button class="action-btn action-btn-secondary" id="edit-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2-8 8H3.5v-2l8-8z"/></svg>
        Edit Selected
      </button>

      <!-- Favourites -->
      <div class="section">
        <div class="section-header" id="fav-header">
          <span class="section-title">Favourites</span>
          <span class="section-chevron" id="fav-chevron">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>
          </span>
        </div>
        <div class="section-body" id="fav-list">
          <p class="hint">No favourites yet</p>
        </div>
        <div class="section-footer hidden" id="fav-footer">
          <button class="clear-link" id="clear-favs">Clear all</button>
        </div>
      </div>

      <!-- Recents -->
      <div class="section">
        <div class="section-header" id="recent-header">
          <span class="section-title">Recently Placed</span>
          <span class="section-chevron" id="recent-chevron">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>
          </span>
        </div>
        <div class="section-body" id="recent-list">
          <p class="hint">No recent templates yet</p>
        </div>
      </div>

      <!-- Feedback -->
      <div class="section-footer" style="text-align:center;padding:10px 0 4px;">
        <button class="clear-link" id="feedback-btn">Report a bug · Suggest a feature</button>
      </div>

    </div>

    <script>
      /* ── Display names ────────────────────────────── */
      const DISPLAY_NAMES = {
        'bar-model': 'Bar Model', 'fraction-wall': 'Fraction Wall', 'fraction-circles': 'Fraction Circles',
        'place-value-chart': 'Place Value Chart', 'hundreds-chart': 'Hundreds Chart',
        'multiplication-grid': 'Multiplication Grid', 'number-line': 'Number Line',
        'fraction-number-line': 'Fraction Number Line', 'double-number-line': 'Double Number Line',
        'ten-frames': 'Ten Frames', 'place-value-counters': 'Place Value Counters',
        'part-whole-model': 'Part-Whole Model', 'ratio-bar': 'Ratio Bar',
        'percentage-bar': 'Percentage Bar', 'red-yellow-counters': 'Red-Yellow Counters',
        'number-pattern': 'Number Pattern', 'clock-face': 'Clock Face', 'thermometer': 'Thermometer',
        'dice': 'Dice', 'spinner': 'Spinner', 'factor-tree': 'Factor Tree',
        'column-arithmetic': 'Column Arithmetic',
        'long-division': 'Long Division', 'bidmas': 'BIDMAS', 'conversion-chart': 'Conversion Chart',
        'function-machine': 'Function Machine', 'algebra-tiles': 'Algebra Tiles',
        'area-model-multiplication-': 'Area Model', 'coordinate-grid': 'Coordinate Grid',
        'two-way-table': 'Two-Way Table', 'equation-balance': 'Equation Balance',
        'two-column-proof': 'Two-Column Proof', 'regular-polygon': 'Regular Polygon',
        'compound-shape': 'Compound Shape', 'circle-sector': 'Circle Sector',
        'right-angled-triangle': 'Right-Angled Triangle', 'trig-triangle': 'Trig Triangle',
        'parallel-transversal': 'Parallel Lines', 'circle-theorems': 'Circle Theorems',
        'bearings-diagram': 'Bearings', 'unit-circle': 'Unit Circle', 'protractor': 'Protractor',
        'symmetry-grid': 'Symmetry Grid', 'iso-dot-grid': 'Isometric Dot Grid',
        'cube': 'Cube', 'cuboid': 'Cuboid', 'cylinder': 'Cylinder', 'cone': 'Cone',
        'sphere': 'Sphere', 'triangular-prism': 'Triangular Prism', 'square-pyramid': 'Square Pyramid',
        'venn-diagram': 'Venn Diagram', 'carroll-diagram': 'Carroll Diagram',
        'tree-diagram': 'Tree Diagram', 'box-whisker': 'Box & Whisker',
        'probability-scale': 'Probability Scale', 'stem-leaf': 'Stem & Leaf',
        'normal-distribution': 'Normal Distribution', 'tally-chart': 'Tally Chart',
        'frequency-table': 'Frequency Table', 'pie-chart-data': 'Pie Chart',
        'scatter-plot': 'Scatter Plot', 'histogram': 'Histogram',
        'cumulative-frequency': 'Cumulative Frequency', 'transformation-grid': 'Transformation Grid',
        'argand-diagram': 'Argand Diagram',
        'ruler': 'Ruler', 'weighing-scale': 'Weighing Scale', 'reading-scale': 'Reading Scale',
      };

      function nameFor(id) {
        return DISPLAY_NAMES[id] || id.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      }

      /* ── Collapsible sections ─────────────────────── */
      function makeCollapsible(headerId, chevronId, bodyId) {
        let open = true;
        document.getElementById(headerId).addEventListener('click', () => {
          open = !open;
          document.getElementById(bodyId).classList.toggle('hidden', !open);
          document.getElementById(chevronId).classList.toggle('closed', !open);
        });
      }

      makeCollapsible('fav-header', 'fav-chevron', 'fav-list');
      makeCollapsible('recent-header', 'recent-chevron', 'recent-list');

      /* ── Browse Library ───────────────────────────── */
      document.getElementById('browse-btn').onclick = async () => {
        localStorage.removeItem('tpl-edit-settings');
        await miro.board.ui.openModal({ url: 'templates/app.html', width: 1000, height: 700 });
      };

      /* ── Edit Selected ────────────────────────────── */
      document.getElementById('edit-btn').onclick = async () => {
        const selection = await miro.board.getSelection();
        const images = selection.filter(item => item.type === 'image');
        if (images.length === 0) {
          await miro.board.notifications.showError('Select a template image first');
          return;
        }
        const img = images[0];
        let settings;
        try {
          settings = JSON.parse(img.title);
          if (!settings._tplGen) throw new Error('Not a template image');
        } catch {
          await miro.board.notifications.showError('Selected image was not created by Maths Templates');
          return;
        }
        localStorage.setItem('tpl-edit-settings', JSON.stringify(settings));
        await miro.board.ui.openModal({ url: 'templates/app.html', width: 1000, height: 700 });
      };

      /* ── Favourites ───────────────────────────────── */
      document.getElementById('clear-favs').onclick = () => {
        localStorage.removeItem('tpl-favourites');
        renderFavourites();
      };

      function getFavourites() {
        try { return JSON.parse(localStorage.getItem('tpl-favourites') || '[]'); } catch { return []; }
      }

      function renderFavourites() {
        const favs = getFavourites();
        const container = document.getElementById('fav-list');
        const footer = document.getElementById('fav-footer');

        if (favs.length === 0) {
          container.innerHTML = '<p class="hint">No favourites yet</p>';
          footer.classList.add('hidden');
          return;
        }

        footer.classList.remove('hidden');
        container.innerHTML = '';

        favs.forEach(id => {
          const card = document.createElement('button');
          card.className = 'panel-card';
          card.innerHTML = `<div class="card-content"><div class="card-name">${nameFor(id)}</div></div><span class="card-star">&#9733;</span>`;
          card.onclick = async () => {
            localStorage.setItem('tpl-panel-select', id);
            localStorage.removeItem('tpl-edit-settings');
            await miro.board.ui.openModal({ url: 'templates/app.html', width: 1000, height: 700 });
          };
          container.appendChild(card);
        });
      }

      /* ── Recents ──────────────────────────────────── */
      function getRecents() {
        try { return JSON.parse(localStorage.getItem('tpl-recents') || '[]'); } catch { return []; }
      }

      function buildDesc(entry) {
        if (!entry.settings) return '';
        const vals = Object.entries(entry.settings)
          .filter(([k, v]) => v && typeof v === 'string' && v.length < 30 && !k.startsWith('_'))
          .slice(0, 2)
          .map(([, v]) => v);
        return vals.length ? escHtml(vals.join(' · ')) : '';
      }

      function escHtml(str) {
        const d = document.createElement('div'); d.textContent = str; return d.innerHTML;
      }

      function renderRecents() {
        const recents = getRecents();
        const container = document.getElementById('recent-list');

        if (recents.length === 0) {
          container.innerHTML = '<p class="hint">No recent templates yet</p>';
          return;
        }

        container.innerHTML = '';
        recents.forEach(entry => {
          const card = document.createElement('button');
          card.className = 'panel-card';
          const desc = buildDesc(entry);
          card.innerHTML = `<div class="card-content"><div class="card-name">${nameFor(entry.id)}</div>${desc ? `<div class="card-desc">${desc}</div>` : ''}</div>`;
          card.onclick = async () => {
            const editPayload = { _tplGen: true, template: entry.id, inputs: entry.settings || {} };
            localStorage.setItem('tpl-edit-settings', JSON.stringify(editPayload));
            await miro.board.ui.openModal({ url: 'templates/app.html', width: 1000, height: 700 });
          };
          container.appendChild(card);
        });
      }

      /* ── Refresh on focus ─────────────────────────── */
      window.addEventListener('focus', () => {
        renderFavourites();
        renderRecents();
      });

      /* ── Feedback ────────────────────────────────── */
      document.getElementById('feedback-btn').onclick = () =>
        miro.board.ui.openLink('https://github.com/murphyj123/miro-apps/issues/new');

      /* ── Init ─────────────────────────────────────── */
      renderFavourites();
      renderRecents();
    </script>
  </body>
</html>
