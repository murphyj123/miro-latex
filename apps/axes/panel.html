<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/shared/panel.css" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  </head>
  <body>

    <!-- Header -->
    <div class="panel-header">
      <div class="panel-header-icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
          <line x1="9" y1="2" x2="9" y2="16"/>
          <line x1="2" y1="9" x2="16" y2="9"/>
          <path d="M4 5.5 Q9 3 14 5.5" stroke-dasharray="2 2"/>
        </svg>
      </div>
      <div class="panel-header-text">
        <h1>Graph Axes</h1>
        <p>Create &amp; edit axis grids</p>
      </div>
    </div>

    <!-- Body -->
    <div class="panel-body">

      <button class="action-btn action-btn-primary" id="new-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
        New Graph
      </button>

      <button class="action-btn action-btn-secondary" id="edit-btn">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 2.5l2 2-8 8H3.5v-2l8-8z"/></svg>
        Edit Selected
      </button>

      <!-- Recents -->
      <div class="section">
        <div class="section-header" id="recents-header">
          <span class="section-title">Recently Used</span>
          <span class="section-chevron" id="recents-chevron">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>
          </span>
        </div>
        <div class="section-body" id="recents-body">
          <p class="hint">No recent graphs yet</p>
        </div>
      </div>

      <!-- Library -->
      <div class="section">
        <div class="section-header" id="library-header">
          <span class="section-title">Library</span>
          <span class="section-chevron" id="library-chevron">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="2,4 6,8 10,4"/></svg>
          </span>
        </div>
        <div class="section-body" id="library-body">
          <p class="hint">No saved graphs yet</p>
        </div>
      </div>

    </div>

    <!-- Rename dialog -->
    <div class="dialog-overlay hidden" id="rename-overlay">
      <div class="dialog">
        <div class="dialog-title">Rename Graph</div>
        <input type="text" class="dialog-input" id="rename-input" placeholder="Enter a name…" />
        <div class="dialog-actions">
          <button class="dialog-btn dialog-btn-cancel" id="rename-cancel">Cancel</button>
          <button class="dialog-btn dialog-btn-ok" id="rename-ok">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="/axes/src/panel.js"></script>
  </body>
</html>
