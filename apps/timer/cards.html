<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #ffffff;
        --bg-secondary: #f5f6f8;
        --text: #1a1a2e;
        --text-secondary: #6b7280;
        --border: #e5e7eb;
        --btn-bg: #f3f4f6;
        --color-active: #10b981;
        --radius: 8px;
        --radius-pill: 20px;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      h2 {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }

      .hint {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: -12px;
        line-height: 1.5;
      }

      .field-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .pills {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .dur-pill {
        padding: 6px 16px;
        border: 1px solid var(--border);
        border-radius: var(--radius-pill);
        background: var(--bg);
        color: var(--text);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
      }

      .dur-pill:hover { border-color: var(--color-active); color: var(--color-active); }
      .dur-pill.active { background: var(--color-active); border-color: var(--color-active); color: #fff; }

      .label-input {
        width: 100%;
        padding: 9px 12px;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-secondary);
        color: var(--text);
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }

      .label-input:focus { border-color: var(--color-active); }
      .label-input::placeholder { color: var(--text-secondary); }

      .btn-place {
        width: 100%;
        padding: 12px;
        background: var(--color-active);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: filter 0.15s;
      }

      .btn-place:hover { filter: brightness(1.1); }

      .btn-place svg { width: 16px; height: 16px; }

      .custom-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }

      .custom-row input {
        width: 64px;
        padding: 6px 10px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-secondary);
        color: var(--text);
        text-align: center;
        font-variant-numeric: tabular-nums;
        outline: none;
        transition: border-color 0.15s;
      }

      .custom-row input:focus { border-color: var(--color-active); }

      .custom-row label {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .btn-custom-set {
        padding: 6px 14px;
        background: var(--color-active);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: filter 0.15s;
      }

      .btn-custom-set:hover { filter: brightness(1.1); }
    </style>
  </head>
  <body>
    <div>
      <h2>Timer Cards</h2>
    </div>
    <p class="hint">Place a clickable card on the board. Click it to open the timer pre-set to that duration.</p>

    <div>
      <div class="field-label">Duration</div>
      <div class="pills">
        <button class="dur-pill active" data-seconds="300">5 min</button>
        <button class="dur-pill" data-seconds="600">10 min</button>
        <button class="dur-pill" data-seconds="900">15 min</button>
        <button class="dur-pill" data-seconds="1200">20 min</button>
        <button class="dur-pill" data-seconds="1800">30 min</button>
        <button class="dur-pill" data-seconds="2700">45 min</button>
        <button class="dur-pill" data-seconds="3600">60 min</button>
      </div>
      <div class="custom-row">
        <label for="custom-min">Min</label>
        <input type="number" id="custom-min" min="0" max="99" value="0" />
        <label for="custom-sec">Sec</label>
        <input type="number" id="custom-sec" min="0" max="59" value="0" />
        <button class="btn-custom-set" id="btn-custom-set">Set</button>
      </div>
    </div>

    <div>
      <div class="field-label">Label (optional)</div>
      <input type="text" id="card-label" class="label-input" placeholder="e.g. Group Activity" maxlength="40" />
    </div>

    <button class="btn-place" id="btn-place">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="5" width="12" height="9" rx="1.5"/><path d="M5 5V4a1 1 0 011-1h4a1 1 0 011 1v1"/><line x1="8" y1="8" x2="8" y2="11"/><line x1="6.5" y1="9.5" x2="9.5" y2="9.5"/></svg>
      Place on Board
    </button>

    <script>
      let durationSeconds = 300;

      function setActivePill(seconds) {
        durationSeconds = seconds;
        document.querySelectorAll('.dur-pill').forEach(p => {
          p.classList.toggle('active', parseInt(p.dataset.seconds) === seconds);
        });
      }

      document.querySelectorAll('.dur-pill').forEach(pill => {
        pill.addEventListener('click', () => setActivePill(parseInt(pill.dataset.seconds)));
      });

      document.getElementById('btn-custom-set').addEventListener('click', () => {
        const min = parseInt(document.getElementById('custom-min').value) || 0;
        const sec = parseInt(document.getElementById('custom-sec').value) || 0;
        const total = min * 60 + sec;
        if (total > 0) setActivePill(total);
      });

      document.getElementById('btn-place').addEventListener('click', async () => {
        const label = document.getElementById('card-label').value.trim();
        const mins = Math.floor(durationSeconds / 60);
        const secs = durationSeconds % 60;
        const durLabel = secs > 0 ? `${mins}m ${secs}s` : `${mins} min`;
        const title = label || `Timer — ${durLabel}`;
        const btn = document.getElementById('btn-place');

        try {
          await miro.board.createAppCard({
            title,
            description: String(durationSeconds),
            fields: [
              { value: 'Tap clock icon to open timer', fillColor: '#f0fdf4', textColor: '#065f46', iconShape: 'round' },
            ],
            style: { cardTheme: '#10b981' },
            status: 'connected',
          });
          document.getElementById('card-label').value = '';
          await miro.board.ui.closeModal();
        } catch (e) {
          console.error('App card creation failed:', e);
        }
      });
    </script>
  </body>
</html>
