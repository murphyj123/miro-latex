<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/timer/src/exam.css" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  </head>
  <body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="setup-screen">
      <div class="setup-card">
        <h1 class="setup-title">Exam Mode</h1>

        <!-- Saved presets -->
        <div class="exam-presets" id="exam-presets">
          <div class="exam-presets-label">Saved Presets</div>
          <div class="exam-presets-list" id="exam-presets-list">
            <span class="exam-presets-hint">No presets yet</span>
          </div>
        </div>
        <hr class="preset-rule" />

        <div class="form-group">
          <label for="exam-name">Exam Name</label>
          <input type="text" id="exam-name" placeholder="IB Mathematics HL Paper 1" autocomplete="off" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Duration</label>
            <div class="time-inputs">
              <input type="number" id="duration-hours" min="0" max="5" value="1" />
              <span class="time-sep">h</span>
              <input type="number" id="duration-minutes" min="0" max="59" value="30" />
              <span class="time-sep">m</span>
            </div>
          </div>
          <div class="form-group">
            <label for="reading-time">Reading Time</label>
            <select id="reading-time">
              <option value="0">None</option>
              <option value="5" selected>5 minutes</option>
              <option value="10">10 minutes</option>
              <option value="15">15 minutes</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Extra Time</label>
          <div class="checkbox-row">
            <label class="checkbox-label">
              <input type="checkbox" id="extra-25" />
              <span>25% extra time</span>
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="extra-50" />
              <span>50% extra time</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label>Start Time</label>
          <div class="start-time-row">
            <label class="radio-label">
              <input type="radio" name="start-mode" value="now" checked />
              <span>Now</span>
            </label>
            <label class="radio-label">
              <input type="radio" name="start-mode" value="scheduled" />
              <span>At</span>
            </label>
            <input type="time" id="scheduled-time" disabled />
          </div>
        </div>

        <div class="form-group">
          <label>Sound</label>
          <div class="sound-row">
            <div class="sound-type">
              <label class="radio-label">
                <input type="radio" name="sound-mode" value="voice" checked />
                <span>Voice</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="sound-mode" value="tones" />
                <span>Tones</span>
              </label>
            </div>
            <select id="exam-voice" class="voice-select">
              <option value="sonia">Sonia · UK female (soft)</option>
              <option value="libby">Libby · UK female (warm)</option>
              <option value="ryan">Ryan · UK male (friendly)</option>
              <option value="aria">Aria · US female (clear)</option>
            </select>
            <button type="button" class="btn-preview" id="btn-preview-voice" title="Preview voice">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><polygon points="4,3 13,8 4,13"/></svg>
            </button>
          </div>
          <div class="volume-row">
            <svg class="volume-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6v4h2.5L9 13V3L5.5 6H3z"/><path d="M11 6c.6.5 1 1.2 1 2s-.4 1.5-1 2"/></svg>
            <input type="range" id="exam-volume" min="0" max="100" value="60" />
            <span class="volume-value" id="exam-volume-value">60%</span>
          </div>
        </div>

        <div class="form-group">
          <label for="exam-notes">Instructions <span class="label-hint">(optional)</span></label>
          <textarea id="exam-notes" rows="2" placeholder="e.g. No calculators · Show all working" autocomplete="off"></textarea>
        </div>

        <div class="form-actions">
          <button class="btn-save-preset" id="btn-save-preset">Save Preset</button>
          <button class="btn-start-exam" id="btn-start-exam">Start Exam</button>
        </div>
      </div>
    </div>

    <!-- Display Screen -->
    <div id="display-screen" class="display-screen" style="display:none;">
      <div class="top-bar">
        <span class="exam-name-display" id="exam-name-display"></span>
        <div class="top-bar-volume">
          <svg class="volume-icon" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6v4h2.5L9 13V3L5.5 6H3z"/><path d="M11 6c.6.5 1 1.2 1 2s-.4 1.5-1 2"/></svg>
          <input type="range" id="display-volume" min="0" max="100" value="60" title="Voice volume" />
        </div>
        <div class="top-bar-right">
          <span class="exam-date" id="exam-date"></span>
          <span class="current-time" id="current-time">00:00:00</span>
        </div>
      </div>

      <div class="main-area">
        <div class="phase-badge" id="phase-badge">WRITING TIME</div>

        <div class="pause-info" id="pause-info" style="display:none;">
          <span class="pause-info-label">Paused</span>
          <span class="pause-info-duration" id="pause-duration">00:00</span>
        </div>

        <div class="time-remaining" id="time-remaining">0:00:00</div>

        <div class="time-elapsed-row">
          <span class="time-elapsed-label">Elapsed</span>
          <span class="time-elapsed" id="time-elapsed">00:00</span>
        </div>

        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div class="notes-section">
        <div class="notes-header">Instructions</div>
        <textarea
          class="notes-editor"
          id="notes-editor"
          rows="1"
          placeholder="Click to add instructions…"
          autocomplete="off"
          spellcheck="false"
        ></textarea>
      </div>

      <div class="end-times-section">
        <table class="end-times-table" id="end-times-table">
          <thead>
            <tr>
              <th>Category</th>
              <th>End Time</th>
            </tr>
          </thead>
          <tbody id="end-times-body"></tbody>
        </table>
      </div>

      <div class="display-controls">
        <button class="btn-control btn-lock" id="btn-lock" title="Lock controls" aria-pressed="false">
          <svg class="lock-icon lock-icon-open" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7.5" width="10" height="6.5" rx="1.5"/><path d="M5 7.5V5a3 3 0 0 1 5.8-1"/></svg>
          <svg class="lock-icon lock-icon-closed" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><rect x="3" y="7.5" width="10" height="6.5" rx="1.5"/><path d="M5 7.5V5a3 3 0 0 1 6 0v2.5"/></svg>
          <span class="lock-label">Unlocked</span>
        </button>
        <button class="btn-control btn-pause" id="btn-pause">Pause</button>
        <button class="btn-control btn-end" id="btn-end">End Exam</button>
      </div>
    </div>

    <script type="module" src="/timer/src/exam.js"></script>
  </body>
</html>
