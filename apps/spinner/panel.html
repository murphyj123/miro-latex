<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/spinner/src/panel.css" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  </head>
  <body>

    <!-- Header -->
    <div class="panel-header">
      <div class="panel-header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><circle cx="12" cy="12" r="2" fill="#fff"/></svg>
      </div>
      <div class="panel-header-text">
        <h1>Classroom Randomiser</h1>
      </div>
    </div>

    <!-- Mode Tabs (top) -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="spinner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg>
        Spin
      </button>
      <button class="mode-tab" data-mode="groups">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Groups
      </button>
      <button class="mode-tab" data-mode="dice">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="16" cy="16" r="1.5" fill="currentColor"/></svg>
        Dice
      </button>
      <button class="mode-tab" data-mode="coin">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><text x="12" y="13" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="currentColor" stroke="none">H</text></svg>
        Coin
      </button>
    </div>

    <div class="panel-body">

      <!-- ── Names Section (Spinner + Groups only) ──────── -->
      <div id="names-section">
        <!-- Saved Classes -->
        <div class="input-section">
          <div class="section-label">Class List</div>
          <div class="class-row">
            <select id="class-select" class="class-select">
              <option value="">— Select a class —</option>
            </select>
            <button class="icon-btn icon-btn-new" id="btn-new" title="Start fresh">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
            </button>
            <button class="icon-btn icon-btn-save" id="btn-save-class" title="Save current list">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 5v8a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1h6l3 3z"/><path d="M10 2v3H7"/><path d="M5 10h6M5 12h4"/></svg>
            </button>
            <button class="icon-btn icon-btn-delete" id="btn-delete-class" title="Delete saved class">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 5h10l-1 9H4L3 5zM6 5V3h4v2"/><line x1="2" y1="5" x2="14" y2="5"/></svg>
            </button>
          </div>
        </div>

        <!-- Add Names -->
        <div class="input-section">
          <div class="add-row">
            <input type="text" id="name-input" class="name-input" placeholder="Type a name..." />
            <button class="btn-add" id="btn-add">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
            </button>
          </div>
        </div>

        <!-- CSV Paste (collapsed by default) -->
        <details class="csv-details">
          <summary class="csv-summary">Paste CSV / bulk import</summary>
          <textarea id="csv-paste" class="csv-paste" rows="3" placeholder="Alice, Bob, Charlie&#10;or one name per line..."></textarea>
          <button class="btn-import" id="btn-import">Import Names</button>
        </details>

        <!-- Name List -->
        <div class="section-label" id="names-label">Names (0)</div>
        <div class="name-list" id="name-list"></div>
        <button class="btn-clear-names" id="btn-clear">Clear all</button>

        <hr class="divider" />
      </div>

      <!-- ══ SPINNER OPTIONS ══════════════════════════════ -->
      <div class="mode-panel" id="mode-spinner">
        <div class="options">
          <div class="option-row">
            <span class="option-label">Remove winner after spin</span>
            <label class="toggle"><input type="checkbox" id="remove-winner" /><span class="toggle-slider"></span></label>
          </div>
          <div class="option-row">
            <span class="option-label">Spin sound</span>
            <label class="toggle"><input type="checkbox" id="spin-sound" checked /><span class="toggle-slider"></span></label>
          </div>
        </div>
        <button class="btn-action btn-action-primary" id="btn-spin" disabled>Open Spinner</button>
        <button class="btn-action btn-action-secondary" id="btn-place-spinner" disabled>Place Wheel on Board</button>
      </div>

      <!-- ══ GROUPS OPTIONS ═══════════════════════════════ -->
      <div class="mode-panel hidden" id="mode-groups">
        <div class="group-config">
          <div class="group-mode-row">
            <select id="group-mode" class="group-mode-select">
              <option value="count">Number of groups</option>
              <option value="size">Group size</option>
            </select>
            <input type="number" id="group-count" class="group-count-input" min="2" max="20" value="3" />
          </div>
        </div>
        <div class="section-label">Teams</div>
        <div class="team-list" id="team-list"></div>
        <button class="btn-action btn-action-primary" id="btn-generate" disabled>Generate Groups</button>
        <button class="btn-action btn-action-secondary" id="btn-place-groups" disabled>Place Groups on Board</button>
      </div>

      <!-- ══ DICE OPTIONS ═════════════════════════════════ -->
      <div class="mode-panel hidden" id="mode-dice">
        <div class="dice-preview" id="dice-preview"></div>
        <div class="dice-config">
          <div class="option-row">
            <span class="option-label">Dice</span>
            <div class="stepper">
              <button class="stepper-btn" id="dice-minus">-</button>
              <span class="stepper-value" id="dice-count-label">1</span>
              <button class="stepper-btn" id="dice-plus">+</button>
            </div>
          </div>
          <div class="option-row">
            <span class="option-label">Type</span>
            <select id="dice-sides" class="config-select">
              <option value="6" selected>D6</option>
              <option value="4">D4</option>
              <option value="8">D8</option>
              <option value="10">D10</option>
              <option value="12">D12</option>
              <option value="20">D20</option>
            </select>
          </div>
          <div class="option-row">
            <span class="option-label">Colour</span>
            <div class="color-swatches" id="dice-colors"></div>
          </div>
          <div class="option-row">
            <span class="option-label">Show total</span>
            <label class="toggle"><input type="checkbox" id="dice-show-total" checked /><span class="toggle-slider"></span></label>
          </div>
          <div class="option-row">
            <span class="option-label">Sound</span>
            <label class="toggle"><input type="checkbox" id="dice-sound" checked /><span class="toggle-slider"></span></label>
          </div>
        </div>
        <button class="btn-action btn-action-primary" id="btn-roll">Roll Dice</button>
      </div>

      <!-- ══ COIN OPTIONS ═════════════════════════════════ -->
      <div class="mode-panel hidden" id="mode-coin">
        <div class="coin-preview" id="coin-preview">
          <div class="coin-disc">?</div>
        </div>
        <div class="dice-config">
          <div class="option-row">
            <span class="option-label">Coins</span>
            <div class="stepper">
              <button class="stepper-btn" id="coin-minus">-</button>
              <span class="stepper-value" id="coin-count-label">1</span>
              <button class="stepper-btn" id="coin-plus">+</button>
            </div>
          </div>
          <div class="option-row">
            <span class="option-label">Colour</span>
            <div class="color-swatches" id="coin-colors"></div>
          </div>
          <div class="option-row">
            <span class="option-label">Sound</span>
            <label class="toggle"><input type="checkbox" id="coin-sound" checked /><span class="toggle-slider"></span></label>
          </div>
        </div>
        <button class="btn-action btn-action-primary" id="btn-flip">Flip Coin</button>
      </div>

      <!-- Branding -->
      <div class="branding-footer">
        <a href="#" id="branding-link">Made by jmaths.xyz</a>
      </div>
    </div>

    <!-- Save Class Dialog -->
    <div class="dialog-overlay hidden" id="save-dialog">
      <div class="dialog">
        <div class="dialog-title">Save Class List</div>
        <input type="text" class="dialog-input" id="save-class-name" placeholder="e.g. 10B Maths" />
        <div class="dialog-actions">
          <button class="dialog-btn dialog-btn-cancel" id="save-cancel">Cancel</button>
          <button class="dialog-btn dialog-btn-ok" id="save-ok">Save</button>
        </div>
      </div>
    </div>

    <script type="module" src="/spinner/src/panel.js"></script>
    <script>
      document.getElementById('branding-link').onclick = () =>
        miro.board.ui.openLink('https://www.jmaths.xyz');
    </script>
  </body>
</html>
