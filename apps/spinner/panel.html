<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/spinner/src/panel.css" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  </head>
  <body>

    <!-- Header -->
    <div class="panel-header">
      <div class="panel-header-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20"/><circle cx="12" cy="12" r="2" fill="#fff"/></svg>
      </div>
      <div class="panel-header-text">
        <h1>Random Spinner</h1>
        <p>Spin to pick a name at random</p>
      </div>
    </div>

    <div class="panel-body">

      <!-- Name Input -->
      <div class="input-section">
        <div class="section-label">Add Names</div>
        <div class="add-row">
          <input type="text" id="name-input" class="name-input" placeholder="Type a name..." />
          <button class="btn-add" id="btn-add">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
          </button>
        </div>
      </div>

      <!-- CSV Paste -->
      <div class="input-section">
        <div class="section-label">Paste Names (CSV / one per line)</div>
        <textarea id="csv-paste" class="csv-paste" rows="4" placeholder="Alice, Bob, Charlie&#10;or one name per line..."></textarea>
        <button class="btn-import" id="btn-import">Import Names</button>
      </div>

      <hr class="divider" />

      <!-- Name List -->
      <div class="section-label" id="names-label">Names (0)</div>
      <div class="name-list" id="name-list"></div>

      <hr class="divider" />

      <!-- Options -->
      <div class="options">
        <div class="option-row">
          <span class="option-label">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8h8M8 4v8"/><circle cx="8" cy="8" r="6.5"/></svg>
            Remove winner after spin
          </span>
          <label class="toggle">
            <input type="checkbox" id="remove-winner" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="option-row">
          <span class="option-label">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v5l3 3"/><circle cx="8" cy="8" r="6.5"/></svg>
            Spin sound
          </span>
          <label class="toggle">
            <input type="checkbox" id="spin-sound" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <hr class="divider" />

      <!-- Action Buttons -->
      <button class="btn-spin" id="btn-spin" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg>
        Open Spinner
      </button>

      <button class="btn-place" id="btn-place" disabled>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M8 5v6M5 8h6"/></svg>
        Place on Board
      </button>

      <button class="btn-clear" id="btn-clear">Clear All</button>

      <!-- Branding -->
      <div class="branding-footer">
        <a href="#" id="branding-link">Made by jmaths.xyz</a>
      </div>

    </div>

    <script type="module" src="/spinner/src/panel.js"></script>
    <script>
      document.getElementById('branding-link').onclick = () =>
        miro.board.ui.openLink('https://www.jmaths.xyz');
    </script>
  </body>
</html>
