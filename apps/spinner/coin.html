<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/spinner/src/coin.css" />
    <script defer src="https://miro.com/app/static/sdk/v2/miro.js"></script>
  </head>
  <body>

    <div class="coin-layout">
      <div class="coin-area" id="coin-area"></div>

      <div class="coin-result hidden" id="coin-result">
        <span id="result-text">Heads</span>
      </div>

      <div class="coin-controls">
        <button class="btn-flip-main" id="btn-flip">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><text x="12" y="13" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="700" fill="currentColor" stroke="none">H</text></svg>
          Flip
        </button>
        <div class="modal-swatches" id="coin-color-swatches"></div>
        <button class="btn-place hidden" id="btn-place">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="8" y1="5" x2="8" y2="11"/><line x1="5" y1="8" x2="11" y2="8"/></svg>
          Place on Board
        </button>
      </div>
    </div>

    <script type="module" src="/spinner/src/coin.js"></script>
  </body>
</html>
